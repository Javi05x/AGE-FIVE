services:
  mongo:
    image: mongo:7
    container_name: primeage-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ProyectoFutbol

  mongo-express:
    image: mongo-express:1
    container_name: primeage-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

  api:
    build: ./api
    container_name: primeage-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "ProyectoFutbol"
      MONGO_COLLECTION: "Jugadores"
    depends_on:
      - mongo
    volumes:
      - ./api:/app

  frontend:
    image: python:3.12-slim
    container_name: primeage-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: bash -lc "pip install -r requirements2.txt && streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    environment:
      - API_BASE=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  mongo_data: